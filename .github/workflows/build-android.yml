name: Build Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'

      - name: Show Flutter version
        run: flutter --version

      - name: Enable Android
        run: flutter config --enable-android

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Android APK (debug, signed with debug keystore)
        # debug build is signed with Android's auto-generated debug keystore,
        # so the resulting APK is installable on real devices. This sidesteps
        # the missing signing config (no keystore in repo) for CI smoke builds.
        # For Play Store / signed releases, see build-android-release.yml.
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlaneClash-Android-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
